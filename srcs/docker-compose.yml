services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    expose: #only to inception net
      - "3306"
  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    depends_on: #not enough, needs ping in script to wait for db
      - mariadb
    expose:
      - "9000"
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html #same volume as wp
    networks:
      - inception
    depends_on:
      - wordpress
    ports: #shown to the outside, maps inception net:443 to main net:443
      - "443:443"

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/vcaratti/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/vcaratti/data/wordpress

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: /home/vcaratti/inception/secrets/db_password.txt
  db_root_password:
    file: /home/vcaratti/inception/secrets/db_root_password.txt
  wp_admin_password:
    file: /home/vcaratti/inception/secrets/wp_admin_password.txt
  wp_user_password:
    file: /home/vcaratti/inception/secrets/wp_user_password.txt
