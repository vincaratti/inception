services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    expose:
      - "3306"

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/vcaratti/data/mariadb

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: /home/vcaratti/inception/secrets/db_password.txt
  db_root_password:
    file: /home/vcaratti/inception/secrets/db_root_password.txt
